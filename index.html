<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>GridInstruments — Isomorphic Keyboard Synthesizer</title>
  <meta name="description" content="Live MIDI & keyboard isomorphic synthesizer. DCompose/Wicki-Hayden layout. Explore tunings from 7-TET to 5-TET on the syntonic temperament continuum.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #000;
      --fg: #fff;
      --dim: #666;
      --subtle: #222;
      --border: #333;
      --accent: #888;
      --gap: 8px;
      --font: 'JetBrains Mono', 'Courier New', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.4;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ──────────────────────────────────────────────── */
    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 6px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .site-title { font-weight: 700; font-size: 11px; color: #fff; letter-spacing: 0.04em; }
    .gh-actions {
      display: inline-flex; align-items: center;
      border: 1px solid var(--border);
    }
    .gh-mark {
      display: inline-flex; align-items: center;
      padding: 2px 6px;
      border-right: 1px solid var(--border);
      background: var(--subtle);
    }
    .gh-mark svg { width: 14px; height: 14px; fill: #fff; }
    .gh-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      font-family: var(--font); font-size: 10px; color: #fff;
      text-decoration: none;
    }
    .gh-btn + .gh-btn { border-left: 1px solid var(--border); }
    .gh-btn:hover { color: var(--fg); background: var(--subtle); }
    .gh-btn svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }
    .gh-btn .star-icon { color: #fff; font-size: 13px; line-height: 1; display: inline-flex; align-items: center; }
    #about-btn {
      font-family: var(--font);
      font-size: 10px;
      color: #fff;
      background: none;
      border: 1px solid var(--border);
      padding: 2px 8px;
      cursor: pointer;
    }
    #about-btn:hover { color: var(--fg); border-color: var(--accent); }
    #reset-layout {
      font-family: var(--font); font-size: 9px; color: var(--dim);
      background: none; border: 1px solid var(--border);
      padding: 2px 6px; cursor: pointer; margin-left: 4px;
    }
    #reset-layout:hover { color: var(--fg); border-color: var(--accent); }

    /* ── Visualiser panel ────────────────────────────────────── */
    #visualiser-panel {
      flex-shrink: 0;
      overflow: visible;
      position: relative;
      transition: height 0.15s ease;
      border-bottom: 1px solid var(--border);
      height: 120px;
    }
    #visualiser-panel.collapsed { height: 0 !important; overflow: visible; border-bottom-width: 0; }
    .panel-resize-handle-wrap {
      position: absolute;
      left: 50%;
      transform: translate(-50%, 50%);
      z-index: 20;
      bottom: 0;
    }
    .pedals-handle-wrap { bottom: auto; top: 0; transform: translate(-50%, -50%); }
    .panel-resize-handle {
      width: 28px;
      height: 24px;
      cursor: row-resize;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--border);
    }
    .panel-resize-handle:focus-visible { outline: 1px solid var(--accent); }
    .panel-resize-handle .grip-arrow { width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; }
    .panel-resize-handle .grip-arrow-up { border-bottom: 4px solid #666; }
    .panel-resize-handle .grip-arrow-down { border-top: 4px solid #666; }
    .panel-resize-handle .grip-line { width: 14px; height: 1px; background: #666; }
    .panel-resize-handle:hover .grip-arrow-up { border-bottom-color: #ccc; }
    .panel-resize-handle:hover .grip-arrow-down { border-top-color: #ccc; }
    .panel-resize-handle:hover .grip-line { background: #ccc; }
    #history-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Grid area ───────────────────────────────────────────── */
    #grid-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }
    #keyboard-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #keyboard-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* ── Grid settings cog ───────────────────────────────────── */
    .grid-cog {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 15;
      width: 32px;
      height: 32px;
      font-size: 18px;
      background: rgba(0, 0, 0, 0.6);
      color: var(--dim);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
    }
    .grid-cog:hover { color: var(--fg); border-color: var(--accent); }
    .grid-cog.active { color: var(--fg); background: rgba(0, 0, 0, 0.8); border-color: var(--accent); }

    /* ── Grid settings overlay ───────────────────────────────── */
    #grid-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(30, 30, 32, 0.78);
      z-index: 12;
      padding: 48px 24px 24px;
      overflow: hidden;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #grid-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, rgba(255,255,255,0.02) 20%, rgba(255,255,255,0.05) 40%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.05) 60%, rgba(255,255,255,0.02) 80%);
      background-size: 300% 100%;
      animation: shimmer 18s linear infinite;
      pointer-events: none;
      z-index: -1;
    }
    @keyframes shimmer {
      0% { background-position: 300% 0; }
      100% { background-position: -100% 0; }
    }
    #grid-overlay.hidden { display: none; }
    .overlay-section {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding-bottom: 8px;
    }
    .overlay-section .ctrl-label { color: #fff; }
    .overlay-section .slider-track { width: 100%; }
    .overlay-section .tuning-slider-area {
      position: relative;
      width: 100%;
      margin-bottom: 40px;
    }
    .overlay-section .tuning-slider-area .slider-track { width: 100%; }
    .overlay-section-title {
      font-size: 9px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Pedals panel ────────────────────────────────────────── */
    #pedals-panel {
      flex-shrink: 0;
      display: flex;
      gap: 1px;
      background: var(--border);
      overflow: visible;
      position: relative;
      border-top: 1px solid var(--border);
    }
    #pedals-panel.collapsed { height: 0 !important; overflow: visible; }
    .pedal-btn {
      flex: 1;
      padding: 12px 0;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--dim);
      background: var(--bg);
      border: none;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .pedal-btn:hover { color: var(--fg); background: var(--subtle); }
    .pedal-btn.active { color: var(--bg); background: var(--fg); }

    /* ── Controls (shared) ───────────────────────────────────── */
    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .ctrl-label {
      font-size: 11px;
      color: var(--dim);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    select, input[type="range"], input[type="number"], input[type="text"] {
      font-family: var(--font);
      font-size: 12px;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 3px 6px;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      outline: none;
    }
    select:focus, input:focus { border-color: var(--accent); }
    select option { background: var(--bg); }

    input[type="range"] {
      padding: 0;
      height: 18px;
      border: none;
      cursor: pointer;
      background: #000;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 18px;
      background: inherit;
    }
    input[type="range"]::-moz-range-track {
      height: 18px;
      background: inherit;
      border: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 3px;
      height: 18px;
      background: var(--fg);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 3px;
      height: 18px;
      background: var(--fg);
      cursor: pointer;
      border: none;
      border-radius: 0;
    }

    .slider-track {
      position: relative;
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .slider-track input[type="range"] {
      flex: 1;
      min-width: 0;
      margin: 0;
    }
    .slider-label-overlay {
      position: absolute;
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      color: #fff;
      mix-blend-mode: difference;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      pointer-events: none;
      z-index: 1;
      white-space: nowrap;
      line-height: 1;
    }
    .slider-value-badge {
      position: absolute;
      bottom: 100%;
      transform: translateX(-50%);
      font-size: 9px;
      color: #fff;
      background: none;
      padding: 0 3px;
      white-space: nowrap;
      z-index: 2;
      line-height: 14px;
      height: 14px;
      pointer-events: none;
      text-align: center;
      font-family: var(--font);
    }
    input.badge-input {
      position: absolute;
      bottom: 100%;
      transform: translateX(-50%);
      font-size: 9px;
      color: #fff;
      background: none;
      padding: 0 3px;
      white-space: nowrap;
      z-index: 2;
      line-height: 14px;
      height: 14px;
      text-align: center;
      font-family: var(--font);
      border: 1px solid transparent;
      width: 50px;
      pointer-events: auto;
      cursor: text;
      outline: none;
    }
    input.badge-input:focus {
      border-color: var(--accent);
      background: var(--subtle);
    }
    .slider-reset {
      font-family: var(--font); font-size: 14px; color: var(--dim);
      background: var(--bg); border: 1px solid var(--border);
      width: 22px; height: 18px; display: inline-flex; align-items: center; justify-content: center; padding: 0;
      cursor: pointer; line-height: 1; flex-shrink: 0; margin-left: 2px;
    }
    .slider-reset:hover { color: var(--fg); border-color: var(--accent); }

    /* ── Tuning slider area (ⓘ button + presets) ─────────────── */
    .tuning-slider-area .slider-track { width: 100%; }
    .tet-presets, .slider-presets {
      position: absolute;
      left: 18px; right: 24px;
      top: 100%;
      pointer-events: none;
      overflow: visible;
    }
    .slider-preset-mark {
      position: absolute;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: auto;
      top: 0;
    }
    .slider-tick {
      width: 1px;
      background: #666;
    }
    .slider-tick-long {
      height: 14px;
    }
    .slider-tick-staggered {
      height: 28px;
    }
    .slider-preset-btn {
      font-family: var(--font);
      font-size: 8px;
      color: var(--dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
    }
    .slider-preset-btn:hover { color: var(--fg); }
    .slider-preset-btn.active { color: #4f4; text-decoration: underline; }
    .midi-panel-row {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; flex-wrap: wrap;
    }
    .slider-info-btn {
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      font-size: 18px;
      color: #fff;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
      opacity: 0.8;
    }
    .slider-info-btn:hover { opacity: 1; color: var(--accent, #4af); }
    .tuning-slider-area .slider-track { margin-left: 18px; }

    /* ── About dialog ────────────────────────────────────────── */
    .about-content h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent, #4af); margin: 24px 0 8px; border-bottom: 1px solid #222; padding-bottom: 4px; }
    .about-content h3 { font-size: 12px; color: #aaa; margin: 16px 0 4px; }
    .about-content p { font-size: 12px; line-height: 1.6; color: #ccc; margin: 8px 0; }
    .about-content ul { margin: 8px 0; padding-left: 16px; }
    .about-content li { font-size: 12px; line-height: 1.6; color: #ccc; margin: 2px 0; }
    .about-content a { color: var(--accent, #4af); text-decoration: none; }
    .about-content a:hover { text-decoration: underline; }
    .about-content code { font-size: 11px; color: #f9a; background: #1a1a1a; padding: 1px 4px; }
    .about-content table { width: 100%; border-collapse: collapse; margin: 8px 0; }
    .about-content td { padding: 4px 8px; border-bottom: 1px solid #222; font-size: 11px; color: #ccc; }
    .about-content td:first-child { white-space: nowrap; }
    dialog {
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 24px;
      max-width: 560px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      font-family: var(--font);
    }
    dialog::backdrop { background: rgba(0,0,0,0.7); }
    dialog button {
      position: absolute; top: 8px; right: 12px;
      background: none; border: none; color: var(--dim);
      font-size: 16px; cursor: pointer; font-family: var(--font);
    }
    dialog button:hover { color: var(--fg); }

    /* ── Chord shape graffiti overlays ────────────────────────── */
    .graffiti-overlay {
      position: absolute;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: 5;
    }
    .graffiti-label {
      font-family: var(--font);
      font-size: 14px;
      font-style: italic;
      fill: #FFD700;
      opacity: 0.9;
    }

    /* ── Wave buttons ────────────────────────────────────────── */
    .wave-group { display: flex; gap: 1px; background: var(--border); border: 1px solid var(--border); }
    .wave-btn { flex: 1; padding: 5px 2px; background: var(--bg); border: none; color: var(--dim); font-family: var(--font); font-size: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.04em; }
    .wave-btn.active { background: var(--fg); color: var(--bg); }
    .wave-btn:hover:not(.active) { background: var(--subtle); color: var(--fg); }

    /* ── Instructions ────────────────────────────────────────── */
    #instructions {
      font-size: 11px;
      color: var(--dim);
      border: 1px solid var(--border);
      padding: 8px 12px;
      line-height: 1.7;
    }
    #instructions kbd {
      background: var(--subtle);
      border: 1px solid var(--border);
      padding: 1px 4px;
      font-family: var(--font);
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- Top bar -->
    <header id="top-bar">
      <div class="top-bar-left">
        <span class="site-title">GridInstruments</span>
        <button id="about-btn" title="About GridInstruments">ⓘ About</button>
        <div class="gh-actions">
          <span class="gh-mark"><svg viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></span>
          <a class="gh-btn" href="https://github.com/zitongcharliedeng/gridinstruments" target="_blank" rel="noopener">
            <span class="star-icon">☆</span> Star <span id="star-count-badge"></span>
          </a>
          <a class="gh-btn" href="https://github.com/zitongcharliedeng/gridinstruments/issues" target="_blank" rel="noopener">
            <svg viewBox="0 0 16 16"><path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM8 0a8 8 0 100 16A8 8 0 008 0zm0 14.5a6.5 6.5 0 110-13 6.5 6.5 0 010 13zM9 4a1 1 0 00-2 0v4a1 1 0 002 0V4z"/></svg>
            Report a bug or request a feature
          </a>
        </div>
        <button id="reset-layout" title="Reset Page Layout (does not reset existing grid presets)">⟲ Reset</button>
      </div>
    </header>

    <!-- Visualiser panel -->
    <div id="visualiser-panel">
      <canvas id="history-canvas" height="120"></canvas>
      <div class="panel-resize-handle-wrap">
        <div class="panel-resize-handle" tabindex="0" role="separator" aria-orientation="horizontal" aria-label="Resize visualiser" data-target="visualiser-panel" data-min="60" data-max="400" data-default="120" data-key="gi_visualiser_h" data-hidden-key="gi_history_hidden"><span class="grip-arrow grip-arrow-up"></span><span class="grip-line"></span><span class="grip-line"></span><span class="grip-arrow grip-arrow-down"></span></div>
      </div>
    </div>

    <!-- Grid area -->
    <div id="grid-area">
      <div id="keyboard-container">
        <canvas id="keyboard-canvas"></canvas>
        <button id="grid-settings-btn" class="grid-cog" title="Grid settings">⚙</button>

        <!-- Grid settings overlay (was sidebar) -->
        <div id="grid-overlay" class="hidden">

          <div class="overlay-section">
            <div class="ctrl-group">
              <span class="ctrl-label">Wave</span>
              <div class="wave-group" role="group" aria-label="Waveform">
                <button class="wave-btn active" data-waveform="sawtooth" title="Sawtooth wave">SAW</button>
                <button class="wave-btn" data-waveform="sine" title="Sine wave">SIN</button>
                <button class="wave-btn" data-waveform="square" title="Square wave">SQR</button>
                <button class="wave-btn" data-waveform="triangle" title="Triangle wave">TRI</button>
              </div>
            </div>
            <div class="ctrl-group" style="margin-top: 12px">
              <div class="slider-track">
                <span class="slider-label-overlay">VOL (dB)</span>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.3" title="Master volume">
                <span class="slider-value-badge" id="volume-thumb-badge">-10.5</span>
                <button class="slider-reset" id="volume-reset" title="Reset volume to default (0.3)">↻</button>
              </div>
            </div>
          </div>

          <div class="overlay-section">
            <div class="ctrl-group">
              <span class="ctrl-label">Layout</span>
              <select id="layout-select" title="Select keyboard physical layout">
              </select>
            </div>
          </div>

          <div class="overlay-section">
            <div class="tuning-slider-area">
              <button class="slider-info-btn" data-info="tuning">ⓘ</button>
              <div class="slider-track">
                <span class="slider-label-overlay" id="tuning-label">FIFTHS TUNING (cents)</span>
                <input type="range" id="tuning-slider" min="683" max="722" step="0.01" value="700" title="Fifth interval tuning in cents (683=7-TET … 722=5-TET)">
                <input type="text" class="badge-input" id="tuning-thumb-badge" value="700" title="Edit fifth interval in cents">
                <button class="slider-reset" id="tuning-reset" title="Reset to 12-TET (700¢)">↻</button>
              </div>
              <div class="tet-presets" id="tet-presets" data-alternate-ticks></div>
            </div>
          </div>

          <div class="overlay-section">
            <div class="tuning-slider-area">
              <button class="slider-info-btn" data-info="skew">ⓘ</button>
              <div class="slider-track">
                <span class="slider-label-overlay" id="skew-label">MECH SKEW</span>
                <input type="range" id="skew-slider" min="-0.5" max="1.5" step="0.01" value="0" title="Mech skew: DCompose (0) to MidiMech (1)">
                <input type="text" class="badge-input" id="skew-thumb-badge" value="0.00" title="Edit skew value.">
                <button class="slider-reset" id="skew-reset" title="Reset to DCompose (0)">↻</button>
              </div>
              <div class="slider-presets" id="skew-presets"></div>
            </div>
          </div>

          <div class="overlay-section">
            <div class="tuning-slider-area">
              <button class="slider-info-btn" data-info="shear">ⓘ</button>
              <div class="slider-track">
                <span class="slider-label-overlay" id="bfact-label">WICKED SHEAR</span>
                <input type="range" id="bfact-slider" min="-0.5" max="1.5" step="0.01" value="0">
                <input type="text" class="badge-input" id="bfact-thumb-badge" value="0.00" title="Edit wicked-ness value.">
                <button class="slider-reset" id="bfact-reset" title="Reset to default (0)">↻</button>
              </div>
              <div class="slider-presets" id="bfact-presets"></div>
            </div>
          </div>

          <div class="overlay-section">
            <div class="slider-track">
              <span class="slider-label-overlay">Zoom (x)</span>
              <input type="range" id="zoom-slider" min="0.2" max="3" step="0.01" value="1" title="Grid zoom level">
              <span class="slider-value-badge" id="zoom-thumb-badge">1.00</span>
              <button class="slider-reset" id="zoom-reset" title="Aims to match keysize to standard keyboard key size">↻</button>
            </div>
          </div>

          <div class="overlay-section d-ref-group">
            <div class="slider-track">
              <span class="slider-label-overlay" id="d-ref-label">D REF (Hz)</span>
              <input type="range" id="d-ref-slider" min="73.42" max="1174.66" step="0.01" value="293.66" title="Reference pitch slider (D2–D6)">
              <input type="text" class="badge-input" id="d-ref-input" value="293.66" style="width:80px; text-transform:none;" title="Edit reference pitch in Hz or note name (default: D4 = 293.66)">
              <button id="d-ref-reset" class="slider-reset" title="Reset to D4 (293.66 Hz)">↻</button>
            </div>
          </div>

          <div class="overlay-section">
            <div class="overlay-section-title">MIDI</div>
            <div id="midi-device-list"></div>
            <div class="midi-panel-row" id="mpe-output-row">
              <span class="ctrl-label" style="color:#fff">MPE Out:</span>
              <label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer;font-size:12px;">
                <input type="checkbox" id="mpe-enabled" style="width:14px;height:14px;cursor:pointer;accent-color:#fff;">
                Enable
              </label>
              <select id="mpe-output-select" style="min-width:120px;" disabled>
                <option value="">No MIDI outputs</option>
              </select>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Pedals -->
    <div id="pedals-panel" style="height:44px">
      <div class="panel-resize-handle-wrap pedals-handle-wrap">
        <div class="panel-resize-handle" tabindex="0" role="separator" aria-orientation="horizontal" aria-label="Resize pedals" data-target="pedals-panel" data-min="30" data-max="120" data-default="44" data-key="gi_pedals_h" data-direction="up" data-hidden-key="gi_pedals_hidden"><span class="grip-arrow grip-arrow-up"></span><span class="grip-line"></span><span class="grip-line"></span><span class="grip-arrow grip-arrow-down"></span></div>
      </div>
      <button class="pedal-btn" id="sustain-indicator" title="Sustain: hold Space or tap" style="padding-top: 4px;">SUSTAIN</button>
      <button class="pedal-btn" id="vibrato-indicator" title="Vibrato: hold Shift or tap" style="padding-top: 4px;">VIBRATO</button>
    </div>

  </div>

  <dialog id="about-dialog">
    <button id="about-close" autofocus>✕</button>
    <div id="about-content" class="about-content"></div>
  </dialog>

  <dialog id="info-dialog">
    <button id="info-close" autofocus>✕</button>
    <div id="info-content" class="about-content"></div>
  </dialog>

  <script type="module" src="/src/main.ts"></script>
  <script>
    fetch('https://api.github.com/repos/zitongcharliedeng/gridinstruments')
      .then(r => r.json()).then(d => {
        const el = document.getElementById('star-count-badge');
        if (el && typeof d.stargazers_count === 'number') el.textContent = d.stargazers_count.toLocaleString();
      }).catch(() => {});
  </script>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <filter id="spray-roughen" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="turbulence" baseFrequency="0.05 0.07" numOctaves="4" seed="3" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>
</body>
</html>
