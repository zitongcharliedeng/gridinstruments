name: Deploy to GitHub Pages

on:
  push:
    tags: ['v*']
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build literate project
        run: nix build

      - name: Determine deploy target
        id: target
        env:
          GH_REF: ${{ github.ref }}
          GH_EVENT: ${{ github.event_name }}
        run: |
          if [[ "$GH_REF" == refs/tags/* ]] || [[ "$GH_EVENT" == "workflow_dispatch" ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare dist from nix store
        run: cp -rL result dist && chmod -R u+w dist

      - name: Rebuild with /dev base (if dev deploy)
        if: steps.target.outputs.is_stable == 'false'
        run: nix develop --command bash -c "npm ci && npx vite build --base /dev/"

      - name: Deploy stable to GitHub Pages root
        if: steps.target.outputs.is_stable == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true

      - name: Deploy dev to GitHub Pages /dev
        if: steps.target.outputs.is_stable == 'false'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: dev
          keep_files: true
