name: Deploy to GitHub Pages

on:
  push:
    tags: ['v*']
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install entangled-cli==2.4.2
      - run: npm ci
      - run: npx playwright install --with-deps firefox

      - name: Verify (tangle → build → lint → test)
        run: npm run verify

      - name: Deploy to GitHub Pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
