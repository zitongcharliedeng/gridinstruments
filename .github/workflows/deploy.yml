name: Deploy to GitHub Pages

on:
  # Stable deploy: only on explicit version tags (e.g., v1.0.0)
  push:
    tags: ['v*']

  # Manual deploy (emergency or promotion)
  workflow_dispatch:

# Sets permissions for GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Entangled
        run: pip install entangled-cli==2.4.2

      - name: Tangle literate source
        run: entangled tangle --force

      - name: Verify tangle output
        run: |
          echo "Tangled files:"
          ls -la src/lib/*.ts src/machines/*.ts src/*.ts 2>/dev/null | wc -l
          echo "files generated from literate/*.lit.md"

      - name: Install dependencies
        run: npm ci

      - name: Build (includes TypeScript check + tangle)
        run: npm run build

      - name: AST-grep scan (informational)
        run: npx ast-grep scan || true
        continue-on-error: true

      - name: Lint (informational)
        run: npm run lint || true
        continue-on-error: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps firefox

      - name: Run tests
        run: npx playwright test --project=firefox --workers=1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
