name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  
  workflow_dispatch:

# Sets permissions for GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Entangled
        run: pip install entangled-cli==2.4.2

      - name: Tangle literate source
        run: entangled tangle --force

      - name: Verify tangle output
        run: |
          # During migration, this check is informational only
          echo "Tangled files:"
          find src -name "*.ts" -newer requirements.txt 2>/dev/null || echo "No newly tangled files (migration not started yet)"
      
      - name: Install dependencies
        run: npm ci
      

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: AST-grep scan
        run: npx ast-grep scan

      - name: Lint
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps firefox

      - name: Run tests
        run: npx playwright test --project=firefox --workers=1

      - name: Build
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
