name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Entangled
        run: pip install entangled-cli==2.4.2

      - name: Tangle literate source
        run: entangled tangle --force

      - name: Verify tangle output
        run: |
          # During migration, this check is informational only
          echo "Tangled files:"
          find src -name "*.ts" -newer requirements.txt 2>/dev/null || echo "No newly tangled files (migration not started yet)"

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: AST-grep scan
        run: npx ast-grep scan

      - name: Lint
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps firefox

      - name: Run Playwright tests
        run: npx playwright test --project=firefox --workers=1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            test-results/
          retention-days: 7
