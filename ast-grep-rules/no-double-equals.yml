id: no-double-equals
language: typescript
rule:
  any:
    - pattern: $A == $B
    - pattern: $A != $B
  not:
    any:
      - pattern: $A == null
      - pattern: $A != null
files:
  - "_generated/**"
severity: warning
message: "Use === instead of == (except for null checks). Strict equality prevents type coercion bugs."
