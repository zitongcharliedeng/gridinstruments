id: no-effect-outside-services
language: typescript
rule:
  pattern: import $$$FROM from 'effect'
files:
  - "_generated/**/*.ts"
ignores:
  - "_generated/services/**/*.ts"
severity: error
message: "Effect-TS imports are only allowed in _generated/services/. Banned from synth hot path, render loop, pure math, and state machines."
note: "Move Effect-TS usage to _generated/services/. See AGENTS.md Literate Programming section."
