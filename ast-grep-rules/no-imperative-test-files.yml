id: no-imperative-test-files
language: typescript
rule:
  pattern: test($NAME, $$$)
  not:
    inside:
      any:
        - pattern: for (const $_ of $$$) { $$$ }
        - pattern: test.describe($$$)
      stopBy: end
files:
  - "tests/behavioral.spec.ts"
  - "tests/panel-resize.spec.ts"
  - "tests/overlay-regression.spec.ts"
severity: error
message: "Imperative tests banned in this file — all behavioral tests must be XState machine-generated via xstate-graph.spec.ts"
note: "These files were deleted during the XState migration. If recreated, tests must use the machine infrastructure."
