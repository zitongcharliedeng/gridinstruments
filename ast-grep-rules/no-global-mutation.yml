id: no-global-mutation
language: typescript
rule:
  any:
    - pattern: window.$PROP = $VAL
    - pattern: "globalThis.$PROP = $VAL"
  not:
    pattern: window.dcomposeApp = $VAL
files:
  - "_generated/**"
severity: warning
message: "Global mutation — only window.dcomposeApp is allowed. Use module scope or DI for state."
