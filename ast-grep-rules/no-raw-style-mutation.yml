id: no-raw-style-mutation
language: typescript
rule:
  all:
    - pattern: $EL.style.$PROP = $VAL
    - not:
        inside:
          pattern: $ACTOR.subscribe($$$)
          stopBy: end
    - not:
        inside:
          kind: function_declaration
          stopBy: end
    - not:
        inside:
          kind: method_definition
          stopBy: end
files:
  - "_generated/components/**"
  - "_generated/lib/**"
  - "_generated/main.ts"
severity: error
message: "Direct style mutation is banned in main.ts — use XState actor.send() and handle DOM in the subscriber."
note: "All UI state must be managed by XState actors. See _generated/machines/ for examples."
