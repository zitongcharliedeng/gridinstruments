id: no-raw-textcontent
language: typescript
rule:
  pattern: $EL.textContent = $VAL
files:
  - "src/main.ts"
severity: error
message: "textContent assignment is banned in main.ts — use XState actor.send() and handle DOM in the subscriber."
note: "All UI state must be managed by XState actors. See src/machines/ for examples."
