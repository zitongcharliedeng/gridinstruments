id: no-font-family-override
language: css
rule:
  all:
    - pattern: "font-family: $VAL"
    - not:
        any:
          - has:
              pattern: "var(--font)"
          - has:
              pattern: "JetBrains Mono"
files:
  - "_generated/**"
severity: error
message: "font-family must use var(--font) or 'JetBrains Mono' — no other fonts allowed."
note: "See CLAUDE.md: JetBrains Mono is the only allowed font."
