id: no-raw-hidden
language: typescript
rule:
  all:
    - pattern: $EL.hidden = $VAL
    - not:
        inside:
          pattern: $ACTOR.subscribe($$$)
          stopBy: end
files:
  - "_generated/components/**"
  - "_generated/lib/**"
  - "_generated/main.ts"
severity: error
message: "Direct .hidden assignment is banned in main.ts — use XState actor.send() and handle DOM in the subscriber."
note: "All UI state must be managed by XState actors. See _generated/machines/ for examples."
