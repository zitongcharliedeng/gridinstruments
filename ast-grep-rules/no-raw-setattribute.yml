id: no-raw-setattribute
language: typescript
rule:
  all:
    - any:
        - pattern: $EL.setAttribute($$$)
        - pattern: $EL.removeAttribute($$$)
    - not:
        inside:
          pattern: $ACTOR.subscribe($$$)
          stopBy: end
files:
  - "_generated/main.ts"
severity: error
message: "setAttribute()/removeAttribute() is banned in main.ts — use XState actor.send() and handle DOM in the subscriber."
note: "All UI state must be managed by XState actors. See _generated/machines/ for examples."
