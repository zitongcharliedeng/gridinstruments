id: no-inline-event-handler-string
language: html
rule:
  any:
    - pattern: 'onclick="$$$"'
    - pattern: 'onchange="$$$"'
    - pattern: 'oninput="$$$"'
    - pattern: 'onkeydown="$$$"'
files:
  - "index.html"
severity: error
message: "Inline string event handlers in HTML — use addEventListener or SolidJS event props."
note: "String handlers create eval-like execution and bypass CSP."
