id: no-resize-observer-in-components
language: typescript
rule:
  pattern: new ResizeObserver($$$)
message: |
  BANNED: ResizeObserver in components. Use SolidJS reactive signals
  (derived from value props) for visibility-dependent rendering.
  ResizeObserver is a DOM observer outside the reactive system.
severity: error
files:
  - "_generated/components/**"
