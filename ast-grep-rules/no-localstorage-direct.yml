id: no-localstorage-direct
language: typescript
rule:
  all:
    - any:
        - pattern: localStorage.getItem($$$)
        - pattern: localStorage.setItem($$$)
        - pattern: localStorage.removeItem($$$)
    - not:
        inside:
          any:
            - pattern: "saveSetting($$$)"
            - pattern: "loadSetting($$$)"
          stopBy: end
files:
  - "_generated/components/**"
  - "_generated/lib/**"
severity: warning
message: "Direct localStorage access in components — use app-core saveSetting/loadSetting for consistent key prefixing."
