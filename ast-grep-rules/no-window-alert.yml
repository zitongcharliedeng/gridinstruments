id: no-window-alert
language: typescript
rule:
  any:
    - pattern: alert($$$)
    - pattern: window.alert($$$)
    - pattern: confirm($$$)
    - pattern: window.confirm($$$)
    - pattern: prompt($$$)
    - pattern: window.prompt($$$)
files:
  - "_generated/**"
severity: error
message: "Native browser dialogs (alert/confirm/prompt) are banned — use custom UI components."
