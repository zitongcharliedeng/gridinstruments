id: no-game-reset-without-reload
language: typescript
rule:
  all:
    - pattern: "send({ type: 'GAME_RESET' })"
    - not:
        inside:
          pattern: "loadMidiFromBuffer($$$)"
          stopBy: end
files:
  - "_generated/app-core.ts"
severity: warning
message: "GAME_RESET without loadMidiFromBuffer — the song will be lost. Use lastMidiBuffer to reload."
note: "See #273: calibrate/maxKeys/restart must save+restore the song."
