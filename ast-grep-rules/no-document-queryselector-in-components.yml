id: no-document-queryselector-in-components
language: typescript
rule:
  any:
    - pattern: document.querySelector($$$)
    - pattern: document.querySelectorAll($$$)
files:
  - "_generated/components/**"
severity: warning
message: "document.querySelector in SolidJS components — use refs or getElementById with known IDs."
note: "SolidJS components should use ref props for DOM access, not global queries."
