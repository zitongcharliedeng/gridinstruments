id: no-raw-goto-in-specs
language: typescript
rule:
  pattern: page.goto($$$)
files:
  - "tests/**/*.spec.ts"
ignores:
  - "tests/xstate-graph.spec.ts"
severity: error
message: "page.goto() banned in imperative spec files — all navigation handled by xstate-graph.spec.ts beforeEach"
note: "Only xstate-graph.spec.ts may use page.goto(). Other spec files should be migrated to machine-generated tests."
