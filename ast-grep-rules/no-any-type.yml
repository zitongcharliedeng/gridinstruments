id: no-any-type
language: typescript
rule:
  pattern: $EXPR as any
files:
  - "_generated/components/**"
  - "_generated/lib/**"
  - "_generated/app-core.ts"
  - "_generated/main.ts"
  - "_generated/machines/**"
severity: error
message: "'as any' is banned — use proper types or 'unknown' with type narrowing."
note: "See CLAUDE.md heavenly restrictions: no 'as any'."
