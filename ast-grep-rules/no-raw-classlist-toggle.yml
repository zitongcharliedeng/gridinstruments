id: no-raw-classlist-toggle
language: typescript
rule:
  all:
    - pattern: $EL.classList.toggle($$$)
    - not:
        inside:
          pattern: $ACTOR.subscribe($$$)
          stopBy: end
files:
  - "src/main.ts"
severity: error
message: "classList.toggle() is banned in main.ts — use XState actor.send() and handle DOM in the subscriber."
note: "All UI state must be managed by XState actors. See src/machines/ for examples."
