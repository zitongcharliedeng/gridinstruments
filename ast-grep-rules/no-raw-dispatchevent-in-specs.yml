id: no-raw-dispatchevent-in-specs
language: typescript
rule:
  pattern: dispatchEvent(new $EVENT($$$))
  inside:
    pattern: page.evaluate($$$)
    stopBy: end
files:
  - "tests/*.spec.ts"
severity: error
message: "Raw dispatchEvent inside page.evaluate() banned in spec files — use PlaywrightActions from machine registry"
note: "All DOM event dispatch must go through XState machine PlaywrightActions for traceability. Machine files in tests/machines/ are exempt."
