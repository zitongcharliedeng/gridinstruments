id: no-raw-tooltips
language: html
rule:
  any:
    - pattern: <$TAG title="$$$TITLE" $$$ATTRS>
    - pattern: <$TAG $$$ATTRS title="$$$TITLE">
    - pattern: <$TAG $$$BEFORE title="$$$TITLE" $$$AFTER>
files:
  - "**/*.html"
severity: error
message: "Raw `title=` tooltip banned — use the InfoButton component with data-info popup instead. See literate/components/InfoButton.lit.md for the pattern."
note: "All user-facing tooltips must use the InfoButton + dialog system (data-info attribute on .slider-info-btn). Raw title= attributes show inconsistent browser tooltips that don't match the design system."
