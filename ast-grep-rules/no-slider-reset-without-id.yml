id: no-slider-reset-without-id
language: tsx
rule:
  pattern: |
    <button class="slider-reset $$$">
  not:
    has:
      pattern: id={$_}
severity: error
message: "Slider reset button MUST have an id attribute — app-core finds it by getElementById"
note: "Use id={`${props.def.id}-reset`} or a static id string. Without an id, the reset button is invisible to app-core."
